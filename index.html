<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rishi AI</title>

<style>
body{
font-family: Arial;
background:#0b0f1a;
color:white;
margin:0;
}

header{
background:#111827;
padding:15px;
text-align:center;
font-size:20px;
font-weight:bold;
}

#chat{
height:70vh;
overflow:auto;
padding:10px;
}

.msg{
padding:10px;
margin:8px 0;
border-radius:10px;
}

.user{
background:#2563eb;
text-align:right;
}

.ai{
background:#1f2937;
}

input{
width:80%;
padding:12px;
border:none;
outline:none;
}

button{
width:20%;
background:#22c55e;
border:none;
color:white;
font-weight:bold;
}

.footer{
position:fixed;
bottom:0;
width:100%;
display:flex;
}
</style>
</head>

<body>

<header>Rishi AI</header>

<div id="chat"></div>

<div class="footer">
<input id="input" placeholder="Ask Rishi AI..." />
<button onclick="send()">Send</button>
</div>

<script>
function send(){
let input=document.getElementById("input");
let chat=document.getElementById("chat");

let user=document.createElement("div");
user.className="msg user";
user.innerText=input.value;
chat.appendChild(user);

let ai=document.createElement("div");
ai.className="msg ai";
ai.innerText="Rishi AI is active. Full AI coming soon.";
chat.appendChild(ai);

input.value="";
chat.scrollTop=chat.scrollHeight;
}
</script>

</body>
  </html>
