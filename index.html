
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rishi AI</title>

<style>
body{
background:#0b1020;
color:white;
font-family:Arial;
margin:0;
}

header{
background:#111827;
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
}

#chat{
height:70vh;
overflow:auto;
padding:10px;
}

.user{
background:#2563eb;
padding:10px;
border-radius:10px;
margin:5px;
text-align:right;
}

.bot{
background:#1f2937;
padding:10px;
border-radius:10px;
margin:5px;
}

.inputBox{
display:flex;
position:fixed;
bottom:0;
width:100%;
}

input{
flex:1;
padding:15px;
border:none;
outline:none;
}

button{
padding:15px;
background:#22c55e;
border:none;
color:white;
}
</style>
</head>

<body>

<header>Rishi AI</header>

<div id="chat"></div>

<div class="inputBox">
<input id="msg" placeholder="Ask Rishi AI...">
<button onclick="send()">Send</button>
</div>

<script>

async function send(){

let input=document.getElementById("msg")
let chat=document.getElementById("chat")

let user=input.value
if(!user) return

chat.innerHTML+=`<div class="user">${user}</div>`
input.value=""

let bot=document.createElement("div")
bot.className="bot"
bot.innerText="Thinking..."
chat.appendChild(bot)

try{

let res=await fetch("https://rishi-ai-proxy.vercel.app/api/chat<",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
message:user
})
})

let data=await res.json()

bot.innerText=data.reply

}catch(e){
bot.innerText="Server error"
}

chat.scrollTop=chat.scrollHeight

}

</script>

</body>
</html>
