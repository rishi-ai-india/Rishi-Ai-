<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rishi AI</title>

<style>
body{
background:#0b1020;
color:white;
font-family:Arial;
margin:0;
}

header{
background:#111827;
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
}

#chat{
padding:10px;
height:70vh;
overflow:auto;
}

.user{
background:#2563eb;
padding:10px;
margin:5px;
border-radius:10px;
text-align:right;
}

.bot{
background:#1f2937;
padding:10px;
margin:5px;
border-radius:10px;
}

#inputBox{
position:fixed;
bottom:0;
width:100%;
display:flex;
}

input{
flex:1;
padding:15px;
border:none;
}

button{
background:#22c55e;
color:white;
border:none;
padding:15px;
}
</style>
</head>

<body>

<header>Rishi AI</header>

<div id="chat"></div>

<div id="inputBox">
<input id="msg" placeholder="Ask Rishi AI...">
<button onclick="send()">Send</button>
</div>

<script>
function send(){
let input=document.getElementById("msg");
let chat=document.getElementById("chat");

let user=input.value;

chat.innerHTML+=`<div class="user">${user}</div>`;

let reply="";

if(user.toLowerCase().includes("hello") || user.includes("hi"))
reply="Hello! Main Rishi AI hoon.";

else if(user.includes("kaun"))
reply="Main Rishi AI hoon. Hindi aur English dono bol sakta hoon.";

else if(user.includes("help"))
reply="Main aapki madad kar sakta hoon.";

else
reply="Rishi AI learning... jaldi full AI activate hoga.";

chat.innerHTML+=`<div class="bot">${reply}</div>`;

input.value="";
chat.scrollTop=chat.scrollHeight;
}
</script>

</body>
</html>
